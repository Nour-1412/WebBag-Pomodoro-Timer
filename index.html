<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مؤقت بومودورو للدراسة | WebBag</title>

<meta name="description" content="مؤقت بومودورو مجاني للطلاب يساعد على زيادة التركيز والإنتاجية أثناء الدراسة.">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<div class="card">

<h1>مؤقت بومودورو</h1>

<p class="subtitle">
ركز لمدة 25 دقيقة ثم خذ استراحة قصيرة لزيادة إنتاجيتك.
</p>

<div class="timer-box">

<div id="modeLabel">
جلسة دراسة
</div>

<div id="timer">
25:00
</div>

</div>

<div class="buttons">

<button id="startBtn">
ابدأ
</button>

<button id="pauseBtn">
إيقاف مؤقت
</button>

<button id="resetBtn">
إعادة ضبط
</button>

</div>

<div class="sessions">

الجلسات المكتملة:
<strong id="sessionsCount">0</strong>

</div>

</div>

</div>

<audio id="alarmSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script src="app.js"></script>

</body>
</html>
